name: Oak Ridge National Laboratory
description: >-
  Oak Ridge National Laboratory (ORNL) is the largest US Department of Energy
  science and energy laboratory. ORNL provides public data and scientific
  computing resources for research including neutron science, materials science,
  computing, energy, and national security.
